<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Night Live Leaderboard</title>
  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1430;
      --bg2:#1B0E2A;

      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.70);
      --line: rgba(255,255,255,0.14);

      --gold1: rgba(255,215,0,0.62);
      --gold2: rgba(255,215,0,0.18);

      --silver1: rgba(220,220,220,0.45);
      --silver2: rgba(220,220,220,0.14);

      --bronze1: rgba(205,127,50,0.48);
      --bronze2: rgba(205,127,50,0.14);
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 15% 10%, rgba(96,165,250,0.22), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(244,114,182,0.16), transparent 55%),
        radial-gradient(900px 650px at 70% 90%, rgba(52,211,153,0.14), transparent 55%),
        linear-gradient(140deg, var(--bg0), var(--bg1) 45%, var(--bg2));
    }

    header{
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(7,10,18,0.95), rgba(7,10,18,0.55));
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
    }

    .title-row{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1{
      margin:0;
      font-size: clamp(18px, 2.6vw, 34px);
      letter-spacing: 0.4px;
    }

    .meta{
      display:flex;
      gap: 10px;
      font-size: clamp(12px, 1.4vw, 15px);
      color: var(--muted);
      align-items:center;
      flex-wrap: wrap;
    }

    .pill{
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      white-space: nowrap;
    }

    main{ padding: 14px 16px 22px; }

    .board{
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 60px rgba(0,0,0,0.45);
    }

    #scroller{
      height: calc(100vh - 128px);
      overflow: hidden;
      position: relative;
    }

    table{
      width:100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      text-align:left;
      padding: 12px 10px;
      font-size: clamp(12px, 1.5vw, 16px);
      color: rgba(255,255,255,0.78);
      background: rgba(7,10,18,0.86);
      border-bottom: 1px solid var(--line);
    }

    tbody td{
      padding: 11px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      font-size: clamp(14px, 1.75vw, 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr:nth-child(2n){
      background: rgba(255,255,255,0.02);
    }

    /* Column sizing */
    th.rank, td.rank{ width: 68px; font-variant-numeric: tabular-nums; }
    th.team, td.team{ width: 32%; }

    /* Total next to Team: bigger, bolder, red */
    th.total, td.total{
      width: 110px;
      text-align:right;
      font-variant-numeric: tabular-nums;
    }
    td.total.total-emphasis{
      font-weight: 900;
      font-size: clamp(18px, 2.3vw, 30px);
      color: rgba(255, 70, 70, 0.95);
      letter-spacing: 0.2px;
    }
    th.total.total-emphasis{
      color: rgba(255, 170, 170, 0.90);
    }

    /* Round columns: compact */
    th.round, td.round{
      width: 58px;
      text-align:center;
      font-variant-numeric: tabular-nums;
    }
    td.round{
      font-size: clamp(12px, 1.25vw, 16px);
      color: rgba(255,255,255,0.82);
    }
    th.round{
      font-size: clamp(11px, 1.15vw, 14px);
      color: rgba(255,255,255,0.70);
    }

    /* Top 3 styling */
    tr.top1{
      background: linear-gradient(90deg, var(--gold1), var(--gold2), transparent 70%);
      box-shadow:
        inset 0 0 0 1px rgba(255,215,0,0.28),
        inset 0 0 22px rgba(255,215,0,0.10);
    }
    tr.top2{
      background: linear-gradient(90deg, var(--silver1), var(--silver2), transparent 70%);
      box-shadow:
        inset 0 0 0 1px rgba(220,220,220,0.20),
        inset 0 0 18px rgba(220,220,220,0.08);
    }
    tr.top3{
      background: linear-gradient(90deg, var(--bronze1), var(--bronze2), transparent 70%);
      box-shadow:
        inset 0 0 0 1px rgba(205,127,50,0.20),
        inset 0 0 18px rgba(205,127,50,0.08);
    }

    tr.top1 td.rank{ color: rgba(255,235,130,1); font-weight: 900; }
    tr.top2 td.rank{ color: rgba(235,235,235,1); font-weight: 900; }
    tr.top3 td.rank{ color: rgba(255,205,165,1); font-weight: 900; }
    tr.top1 td.team, tr.top2 td.team, tr.top3 td.team{ font-weight: 800; }

    .status{
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 560px){
      #scroller{ height: calc(100vh - 150px); }
      th.team, td.team{ width: 46%; }
      th.total, td.total{ width: 96px; }
      td.total.total-emphasis{ font-size: 20px; }
      .hide-on-phone{ display:none; }
    }
  </style>
</head>

<body>
  <header>
    <div class="title-row">
      <h1>Trivia Night • Live Leaderboard</h1>
      <div class="meta">
        <div class="pill" id="refreshPill">Refreshing…</div>
        <div class="pill" id="updatedPill">Last update: —</div>
      </div>
    </div>
  </header>

  <main>
    <div class="board">
      <div id="scroller">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="padding:18px; color: rgba(255,255,255,0.75);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="status">
      <div>Auto-refresh + auto-scroll enabled</div>
      <div id="errorText"></div>
    </div>
  </main>

<script>
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/1AFZrC9idkuIs2dc4uAkRK8kZiTtLtvMgR7x21Wic22o/export?format=csv&gid=1580807625";

  // ✅ MUCH slower scroll (raise SCROLL_TICK_MS to 220 for even slower)
  const SCROLL_PX_PER_TICK = 1;
  const SCROLL_TICK_MS = 580;
  const PAUSE_AT_TOP_MS = 5000;
  const PAUSE_AT_BOTTOM_MS = 1000;

  // Refresh cadence
  const REFRESH_MS = 15000;

  const tbody = document.getElementById("tbody");
  const headerRow = document.getElementById("headerRow");
  const scroller = document.getElementById("scroller");
  const refreshPill = document.getElementById("refreshPill");
  const updatedPill = document.getElementById("updatedPill");
  const errorText = document.getElementById("errorText");

  let scrollTimer = null;
  let isPaused = false;

  let idxRank = -1;
  let idxTeam = -1;
  let idxTotal = -1;
  let roundCols = []; // {label, idx}

  function parseCSV(text){
    const rows = [];
    let row = [], field = "", inQuotes = false;

    for (let i=0; i<text.length; i++){
      const c = text[i];
      const next = text[i+1];

      if (c === '"' && inQuotes && next === '"'){ field += '"'; i++; continue; }
      if (c === '"'){ inQuotes = !inQuotes; continue; }

      if (c === ',' && !inQuotes){ row.push(field); field=""; continue; }
      if ((c === '\n' || c === '\r') && !inQuotes){
        if (field.length || row.length){ row.push(field); rows.push(row); }
        field=""; row=[];
        if (c === '\r' && next === '\n') i++;
        continue;
      }
      field += c;
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function buildColumns(header){
    const h = header.map(x => (x||"").trim());
    const hl = h.map(x => x.toLowerCase());

    idxRank = hl.indexOf("rank");
    idxTeam = hl.indexOf("team");
    idxTotal = hl.indexOf("total");

    // fallback positions if needed
    if (idxRank < 0) idxRank = 0;
    if (idxTeam < 0) idxTeam = 1;
    if (idxTotal < 0) idxTotal = 2;

    // Round columns are everything except rank/team/total (R1..R10 + Bonus)
    roundCols = [];
    for (let i=0; i<h.length; i++){
      if (i === idxRank || i === idxTeam || i === idxTotal) continue;
      const label = h[i];
      if (!label) continue;
      roundCols.push({ label, idx: i });
    }

    // Header order: Rank | Team | Total | Rounds...
    headerRow.innerHTML = `
      <th class="rank">Rank</th>
      <th class="team">Team</th>
      <th class="total total-emphasis">Total</th>
      ${roundCols.map((c, j) => {
        const hideClass = (j >= 3) ? "hide-on-phone" : "";
        return `<th class="round ${hideClass}">${esc(c.label)}</th>`;
      }).join("")}
    `;
  }

  function toNumber(x){
    const n = parseFloat(String(x ?? "").trim());
    return Number.isFinite(n) ? n : 0;
  }

  function normalize(rows){
    if (!rows.length) return [];

    const header = rows[0];
    buildColumns(header);

    const data = [];
    for (let i=1; i<rows.length; i++){
      const r = rows[i];
      if (!r || r.length < 2) continue;

      const team = (r[idxTeam] ?? "").trim();
      if (!team) continue;

      const rank = (r[idxRank] ?? "").trim();
      const total = (r[idxTotal] ?? "").trim();

      data.push({
        rank,
        rankNum: toNumber(rank),
        team,
        total,
        raw: r
      });
    }

    // Sort by numeric rank ascending; if blank, fallback to Total desc
    data.sort((a,b) => {
      const ar = a.rankNum, br = b.rankNum;
      if (ar && br) return ar - br;
      if (ar) return -1;
      if (br) return 1;
      return toNumber(b.total) - toNumber(a.total);
    });

    return data;
  }

  function render(data){
    if (!data.length){
      tbody.innerHTML = `<tr><td colspan="6" style="padding:18px;">No data found. Check your WebExport tab.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((d, i) => {
      const cls = (i===0) ? "top1" : (i===1) ? "top2" : (i===2) ? "top3" : "";

      const roundsHtml = roundCols.map((c, j) => {
        const hideClass = (j >= 3) ? "hide-on-phone" : "";
        const v = (d.raw[c.idx] ?? "").trim();
        return `<td class="round ${hideClass}">${esc(v)}</td>`;
      }).join("");

      return `
        <tr class="${cls}">
          <td class="rank">${esc(d.rank || (i+1))}</td>
          <td class="team">${esc(d.team)}</td>
          <td class="total total-emphasis">${esc(d.total)}</td>
          ${roundsHtml}
        </tr>`;
    }).join("");

    scroller.scrollTop = 0;
  }

  async function refresh(){
    try{
      refreshPill.textContent = "Refreshing…";
      errorText.textContent = "";

      const url = CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Fetch failed (${res.status})`);

      const text = await res.text();
      const rows = parseCSV(text);
      const data = normalize(rows);
      render(data);

      updatedPill.textContent = "Last update: " + new Date().toLocaleTimeString();
      refreshPill.textContent = "Live";
    }catch(err){
      refreshPill.textContent = "Offline?";
      errorText.textContent = "Couldn’t load standings. Check sharing settings / Wi-Fi.";
      console.error(err);
    }
  }

  function startAutoScroll(){
    if (scrollTimer) clearInterval(scrollTimer);

    scrollTimer = setInterval(() => {
      if (isPaused) return;

      const maxScroll = Math.max(0, scroller.scrollHeight - scroller.clientHeight);
      if (maxScroll <= 0) return;

      scroller.scrollTop += SCROLL_PX_PER_TICK;

      if (scroller.scrollTop >= maxScroll - 2){
        isPaused = true;
        setTimeout(() => {
          scroller.scrollTop = 0;
          setTimeout(() => { isPaused = false; }, PAUSE_AT_TOP_MS);
        }, PAUSE_AT_BOTTOM_MS);
      }
    }, SCROLL_TICK_MS);
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
  startAutoScroll();
</script>
</body>
</html>

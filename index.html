<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MTCS Trivia Night Live Leaderboard</title>
  <style>
    :root{
      --bg0:#000000;
      --bg1:#000000;
      --bg2:#000000;

      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.70);
      --line: rgba(255,255,255,0.14);

      --gold1: rgba(255,215,0,0.70);
      --gold2: rgba(255,215,0,0.22);

      /* Silver */
      --silver1: rgba(255,255,255,0.55);
      --silver2: rgba(255,255,255,0.18);

      --bronze1: rgba(205,127,50,0.55);
      --bronze2: rgba(205,127,50,0.18);
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 15% 10%, rgba(96,165,250,0.22), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(244,114,182,0.16), transparent 55%),
        radial-gradient(900px 650px at 70% 90%, rgba(52,211,153,0.14), transparent 55%),
        linear-gradient(140deg, var(--bg0), var(--bg1) 45%, var(--bg2));
    }

    /* ORANGE HEADER */
    header{
      position: sticky;
      top: 0;
      z-index: 10;
      background: #FF6B00;
      border-bottom: 2px solid rgba(0,0,0,0.25);
      padding: 14px 16px;
      backdrop-filter: none;
    }

    .title-row{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* White text with black outline for title */
    h1{
      margin:0;
      font-size: clamp(18px, 2.6vw, 34px);
      letter-spacing: 0.4px;
      color: #fff;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  3px 8px rgba(0,0,0,0.25);
    }

    .meta{
      display:flex;
      gap: 10px;
      font-size: clamp(12px, 1.4vw, 15px);
      color: rgba(0,0,0,0.85);
      align-items:center;
      flex-wrap: wrap;
    }

    .pill{
      padding: 6px 10px;
      border: 1px solid rgba(0,0,0,0.25);
      background: rgba(255,255,255,0.28);
      border-radius: 999px;
      white-space: nowrap;
      color: #000;
    }

    main{ padding: 14px 16px 22px; }

    .board{
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 60px rgba(0,0,0,0.45);
    }

    #scroller{
      height: calc(100vh - 140px);
      overflow: hidden;
      position: relative;
    }

    table{
      width:100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      text-align:left;
      padding: 12px 10px;
      font-size: clamp(12px, 1.5vw, 16px);
      color: rgba(255,255,255,0.78);
      background: rgba(7,10,18,0.90);
      border-bottom: 1px solid var(--line);
    }

    tbody td{
      padding: 11px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      font-size: clamp(14px, 1.75vw, 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: transparent; /* allow row gradients to show */
    }

    tbody tr:nth-child(2n){
      background: rgba(255,255,255,0.02);
    }

    th.rank, td.rank{ width: 68px; font-variant-numeric: tabular-nums; }
    th.team, td.team{ width: 34%; }

    /* Team names larger */
    td.team{
      font-size: clamp(16px, 2.1vw, 26px);
    }

    th.total, td.total{
      width: 130px;
      text-align:right;
      font-variant-numeric: tabular-nums;
    }

    /* Default TOTAL style: WHITE for everyone */
    td.total.total-emphasis{
      font-weight: 950;
      font-size: clamp(18px, 2.5vw, 32px);
      color: rgba(255,255,255,0.98);
      letter-spacing: 0.2px;
    }
    td.total.total-emphasis > span{
      display:inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 18px rgba(255,255,255,0.10);
      min-width: 64px;
      text-align:right;
    }

    /* ONLY rank=1 gets red total */
    tr.firstplace td.total.total-emphasis{
      color: rgba(255, 70, 70, 0.98);
    }
    tr.firstplace td.total.total-emphasis > span{
      background: rgba(255, 70, 70, 0.12);
      border: 1px solid rgba(255, 70, 70, 0.30);
      box-shadow: 0 0 18px rgba(255, 70, 70, 0.18);
    }

    /* Rounds bigger */
    th.round, td.round{
      width: 56px;
      text-align:center;
      font-variant-numeric: tabular-nums;
    }
    td.round{
      font-size: clamp(14px, 1.7vw, 20px);
      font-weight: 800;
      color: rgba(255,255,255,0.92);
    }
    th.round{
      font-size: clamp(12px, 1.25vw, 15px);
      color: rgba(255,255,255,0.78);
    }

    /* Top 3 rows (force them to win) */
    tbody tr.top1{
      background: linear-gradient(90deg, var(--gold1), var(--gold2), transparent 70%) !important;
      box-shadow:
        inset 0 0 0 2px rgba(255,215,0,0.28),
        inset 0 0 22px rgba(255,215,0,0.12);
    }
    tbody tr.top2{
      background: linear-gradient(90deg, var(--silver1), var(--silver2), transparent 72%) !important;
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.32),
        inset 0 0 28px rgba(255,255,255,0.14);
    }
    tbody tr.top3{
      background: linear-gradient(90deg, var(--bronze1), var(--bronze2), transparent 70%) !important;
      box-shadow:
        inset 0 0 0 2px rgba(205,127,50,0.22),
        inset 0 0 18px rgba(205,127,50,0.10);
    }

    tbody tr.top2 td{ color: rgba(255,255,255,0.98); }

    tr.top1 td.rank{ color: rgba(255,235,130,1); font-weight: 900; }
    tr.top2 td.rank{ color: rgba(255,255,255,1); font-weight: 900; }
    tr.top3 td.rank{ color: rgba(255,205,165,1); font-weight: 900; }
    tr.top1 td.team, tr.top2 td.team, tr.top3 td.team{ font-weight: 900; }

    .status{
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 560px){
      #scroller{ height: calc(100vh - 160px); }
      th.team, td.team{ width: 48%; }
      th.total, td.total{ width: 110px; }
      td.total.total-emphasis{ font-size: 20px; }
      .hide-on-phone{ display:none; }
    }
  </style>
</head>

<body>
  <header>
    <div class="title-row">
      <h1>MTCS Trivia Night • Live Leaderboard</h1>
      <div class="meta">
        <div class="pill" id="refreshPill">Refreshing…</div>
        <div class="pill" id="updatedPill">Last update: —</div>
      </div>
    </div>
  </header>

  <main>
    <div class="board">
      <div id="scroller">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="padding:18px; color: rgba(255,255,255,0.75);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="status">
      <div>Auto-refresh + auto-scroll enabled</div>
      <div id="errorText"></div>
    </div>
  </main>

<script>
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/1AFZrC9idkuIs2dc4uAkRK8kZiTtLtvMgR7x21Wic22o/export?format=csv&gid=1580807625";

  const REFRESH_MS = 20000;

  // ✅ 100 is VERY FAST. Use 5–12 for a TV leaderboard.
  const SCROLL_PX_PER_SECOND = 80;
  const PAUSE_AT_TOP_MS = 30000;
  const PAUSE_AT_BOTTOM_MS = 5000;

  const tbody = document.getElementById("tbody");
  const headerRow = document.getElementById("headerRow");
  const scroller = document.getElementById("scroller");
  const refreshPill = document.getElementById("refreshPill");
  const updatedPill = document.getElementById("updatedPill");
  const errorText = document.getElementById("errorText");

  let isPaused = false;

  let idxRank = -1;
  let idxTeam = -1;
  let idxTotal = -1;
  let roundCols = [];

  function parseCSV(text){
    const rows = [];
    let row = [], field = "", inQuotes = false;

    for (let i=0; i<text.length; i++){
      const c = text[i];
      const next = text[i+1];

      if (c === '"' && inQuotes && next === '"'){ field += '"'; i++; continue; }
      if (c === '"'){ inQuotes = !inQuotes; continue; }

      if (c === ',' && !inQuotes){ row.push(field); field=""; continue; }
      if ((c === '\n' || c === '\r') && !inQuotes){
        if (field.length || row.length){ row.push(field); rows.push(row); }
        field=""; row=[];
        if (c === '\r' && next === '\n') i++;
        continue;
      }
      field += c;
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function buildColumns(header){
    const h = header.map(x => (x||"").trim());
    const hl = h.map(x => x.toLowerCase());

    idxRank = hl.indexOf("rank");
    idxTeam = hl.indexOf("team");
    idxTotal = hl.indexOf("total");

    if (idxRank < 0) idxRank = 0;
    if (idxTeam < 0) idxTeam = 1;
    if (idxTotal < 0) idxTotal = 2;

    roundCols = [];
    for (let i=0; i<h.length; i++){
      if (i === idxRank || i === idxTeam || i === idxTotal) continue;
      const label = h[i];
      if (!label) continue;
      roundCols.push({ label, idx: i });
    }

    headerRow.innerHTML = `
      <th class="rank">Rank</th>
      <th class="team">Team</th>
      <th class="total total-emphasis">Total</th>
      ${roundCols.map((c, j) => {
        const hideClass = (j >= 3) ? "hide-on-phone" : "";
        return `<th class="round ${hideClass}">${esc(c.label)}</th>`;
      }).join("")}
    `;
  }

  function toNumber(x){
    const n = parseFloat(String(x ?? "").trim());
    return Number.isFinite(n) ? n : 0;
  }

  function normalize(rows){
    if (!rows.length) return [];
    const header = rows[0];
    buildColumns(header);

    const data = [];
    for (let i=1; i<rows.length; i++){
      const r = rows[i];
      if (!r || r.length < 2) continue;

      const team = (r[idxTeam] ?? "").trim();
      if (!team) continue;

      const rank = (r[idxRank] ?? "").trim();
      const total = (r[idxTotal] ?? "").trim();

      data.push({
        rank,
        rankNum: toNumber(rank),
        team,
        total,
        raw: r
      });
    }

    data.sort((a,b) => {
      const ar = a.rankNum, br = b.rankNum;
      if (ar && br) return ar - br;
      if (ar) return -1;
      if (br) return 1;
      return toNumber(b.total) - toNumber(a.total);
    });

    return data;
  }

  function render(data){
    if (!data.length){
      tbody.innerHTML = `<tr><td colspan="6" style="padding:18px;">No data found. Check your WebExport tab.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((d, i) => {
      const clsTop = (i===0) ? "top1" : (i===1) ? "top2" : (i===2) ? "top3" : "";
      const isFirstPlaceRank = String(d.rank).trim() === "1";
      const clsFirst = isFirstPlaceRank ? "firstplace" : "";
      const cls = [clsTop, clsFirst].filter(Boolean).join(" ");

      const roundsHtml = roundCols.map((c, j) => {
        const hideClass = (j >= 3) ? "hide-on-phone" : "";
        const v = (d.raw[c.idx] ?? "").trim();
        return `<td class="round ${hideClass}">${esc(v)}</td>`;
      }).join("");

      return `
        <tr class="${cls}">
          <td class="rank">${esc(d.rank || (i+1))}</td>
          <td class="team">${esc(d.team)}</td>
          <td class="total total-emphasis"><span>${esc(d.total)}</span></td>
          ${roundsHtml}
        </tr>`;
    }).join("");
  }

  async function refresh(){
    try{
      refreshPill.textContent = "Refreshing…";
      errorText.textContent = "";

      const url = CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Fetch failed (${res.status})`);

      const text = await res.text();
      const rows = parseCSV(text);
      const data = normalize(rows);

      const oldScroll = scroller.scrollTop;
      render(data);
      scroller.scrollTop = oldScroll;

      updatedPill.textContent = "Last update: " + new Date().toLocaleTimeString();
      refreshPill.textContent = "Live";
    }catch(err){
      refreshPill.textContent = "Offline?";
      errorText.textContent = "Couldn’t load standings. Check sharing settings / Wi-Fi.";
      console.error(err);
    }
  }

  let lastTs = null;
  function tick(ts){
    if (lastTs === null) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;

    if (!isPaused){
      const maxScroll = Math.max(0, scroller.scrollHeight - scroller.clientHeight);
      if (maxScroll > 0){
        scroller.scrollTop += SCROLL_PX_PER_SECOND * dt;

        if (scroller.scrollTop >= maxScroll - 1){
          isPaused = true;
          setTimeout(() => {
            scroller.scrollTop = 0;
            setTimeout(() => { isPaused = false; }, PAUSE_AT_TOP_MS);
          }, PAUSE_AT_BOTTOM_MS);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
  requestAnimationFrame(tick);
</script>
</body>
</html>
